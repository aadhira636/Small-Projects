<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Countries by Continent & Subregion</title>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 20px; 
      margin: 0;
      transition: all 0.3s ease;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    #continentSelect, #subregionSelect, #countrySelect { 
      padding: 8px; 
      margin-bottom: 16px; 
    }
    table { 
      border-collapse: collapse; 
      width: 100%; 
      margin-top: 10px; 
      transition: opacity 0.3s ease;
    }
    th, td { 
      border: 1px solid #ccc; 
      padding: 8px; 
      text-align: left; 
    }
    th { 
      background-color: #f4f4f4; 
    }
    .country-details {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border: 2px solid #333;
      border-radius: 10px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 1000;
    }
    .country-details h2 {
      margin-top: 0;
      text-align: center;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .detail-label {
      font-weight: bold;
      min-width: 120px;
    }
    .flag {
      width: 100%;
      max-width: 300px;
      height: 200px;
      object-fit: cover;
      border-radius: 5px;
      margin: 20px auto;
      display: block;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 16px;
    }
    .hidden { display: none !important; }
    .table-container { transition: opacity 0.3s ease; }
  </style>
</head>
<body>

<h2>Countries by Continent & Subregion</h2>

<div class="controls">
  <label>Continent: </label>
  <select id="continentSelect">
    <option value="">All continents</option>
  </select>

  <label>Subregion: </label>
  <select id="subregionSelect">
    <option value="">All subregions</option>
  </select>

  <label>Country: </label>
  <select id="countrySelect">
    <option value="">Select a country</option>
  </select>
</div>

<div class="table-container">
  <table id="countriesTable">
    <thead>
      <tr>
        <th>Continent</th>
        <th>Subregion</th>
        <th>Country</th>
        <th>Capital</th>
        <th>Currencies</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="countryDetails" class="country-details">
  <button class="close-btn" id="closeDetails">&times;</button>
  <div id="countryInfo"></div>
</div>

<script>
  let allCountries = [];
  let currentCountry = null;

  // Main data fetch - get all required fields in one call
  async function fetchCountries() {
    try {
      const response = await fetch("https://restcountries.com/v3.1/all?fields=name,capital,currencies,region,subregion,flags,population,area,borders");
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      allCountries = await response.json();
      populateContinentsDropdown();
      populateCountryDropdown();
      renderTableAndSubregionsDropdown();
    } catch (err) {
      console.error("Fetch error:", err);
      document.body.innerHTML += `<p>Error: ${err.message}</p>`;
    }
  }

  function populateContinentsDropdown() {
    const select = document.getElementById("continentSelect");
    const regions = new Set(allCountries.map(c => c.region || "Other"));

    select.innerHTML = '<option value="">All continents</option>';
    for (const region of regions) {
      const option = document.createElement("option");
      option.value = region;
      option.textContent = region;
      select.appendChild(option);
    }
  }

  function populateSubregionsDropdown() {
    const continentSelect = document.getElementById("continentSelect");
    const subregionSelect = document.getElementById("subregionSelect");
    const selectedRegion = continentSelect.value;

    const regionCountries = selectedRegion === ""
      ? allCountries
      : allCountries.filter(c => (c.region || "Other") === selectedRegion);

    const subregions = new Set(regionCountries.map(c => c.subregion || "n/a"));

    subregionSelect.innerHTML = '<option value="">All subregions</option>';
    for (const subregion of subregions) {
      const option = document.createElement("option");
      option.value = subregion;
      option.textContent = subregion;
      subregionSelect.appendChild(option);
    }
  }

  function populateCountryDropdown() {
    const countrySelect = document.getElementById("countrySelect");
    
    // Update based on current filters
    const continentSelect = document.getElementById("continentSelect");
    const subregionSelect = document.getElementById("subregionSelect");
    
    let filtered = allCountries;
    if (continentSelect.value) {
      filtered = filtered.filter(c => (c.region || "Other") === continentSelect.value);
    }
    if (subregionSelect.value) {
      filtered = filtered.filter(c => (c.subregion || "n/a") === subregionSelect.value);
    }

    countrySelect.innerHTML = '<option value="">Select a country</option>';
    filtered.forEach(country => {
      const option = document.createElement("option");
      option.value = country.name.common;
      option.textContent = country.name.common;
      countrySelect.appendChild(option);
    });
  }

  function renderTableAndSubregionsDropdown() {
    populateSubregionsDropdown();
    populateCountryDropdown();
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById("tableBody");
    const continentSelect = document.getElementById("continentSelect");
    const subregionSelect = document.getElementById("subregionSelect");

    const selectedRegion = continentSelect.value;
    const selectedSubregion = subregionSelect.value;

    let filtered = allCountries;
    if (selectedRegion !== "") {
      filtered = filtered.filter(c => (c.region || "Other") === selectedRegion);
    }
    if (selectedSubregion !== "") {
      filtered = filtered.filter(c => (c.subregion || "n/a") === selectedSubregion);
    }

    tbody.innerHTML = "";
    filtered.forEach(country => {
      const tr = document.createElement("tr");

      const continentCell = document.createElement("td");
      continentCell.textContent = country.region || "Other";

      const subregionCell = document.createElement("td");
      subregionCell.textContent = country.subregion || "n/a";

      const countryCell = document.createElement("td");
      countryCell.textContent = country.name?.common || "n/a";

      const capitalCell = document.createElement("td");
      capitalCell.textContent = country.capital?.[0] || "n/a";

      const currencyCell = document.createElement("td");
      const currencies = [];
      if (country.currencies) {
        for (const code in country.currencies) {
          const cur = country.currencies[code];
          const name = cur.name || code;
          const symbol = cur.symbol || "";
          currencies.push(`${name} (${symbol})`);
        }
      }
      currencyCell.textContent = currencies.length > 0 ? currencies.join(", ") : "n/a";

      tr.appendChild(continentCell);
      tr.appendChild(subregionCell);
      tr.appendChild(countryCell);
      tr.appendChild(capitalCell);
      tr.appendChild(currencyCell);
      tbody.appendChild(tr);
    });
  }

  function showCountryDetails(countryName) {
    const country = allCountries.find(c => c.name.common === countryName);
    if (!country) return;

    currentCountry = country;
    
    const detailsDiv = document.getElementById("countryInfo");
    const flagImg = document.createElement("img");
    flagImg.src = country.flags?.png || "";
    flagImg.alt = `${country.name?.common} flag`;
    flagImg.className = "flag";

    const bordersText = country.borders ? 
      (country.borders.length > 3 ? `${country.borders.slice(0,3).join(", ")}...` : country.borders.join(", ")) : 
      "None";

    const detailsHTML = `
      <h2>${country.name?.common || "N/A"}</h2>
      ${flagImg.outerHTML}
      <div class="detail-row"><span class="detail-label">Continent:</span> <span>${country.region || "N/A"}</span></div>
      <div class="detail-row"><span class="detail-label">Subregion:</span> <span>${country.subregion || "N/A"}</span></div>
      <div class="detail-row"><span class="detail-label">Capital:</span> <span>${country.capital?.[0] || "N/A"}</span></div>
      <div class="detail-row"><span class="detail-label">Population:</span> <span>${country.population?.toLocaleString() || "N/A"}</span></div>
      <div class="detail-row"><span class="detail-label">Area:</span> <span>${country.area?.toLocaleString()} km²</span></div>
      <div class="detail-row"><span class="detail-label">Currencies:</span> <span>${Object.values(country.currencies || {}).map(c => c.name).join(", ") || "N/A"}</span></div>
      <div class="detail-row"><span class="detail-label">Borders:</span> <span>${bordersText}</span></div>
    `;

    detailsDiv.innerHTML = detailsHTML;
    document.getElementById("countryDetails").style.display = "block";
    document.querySelector(".table-container").classList.add("hidden");
    document.querySelector(".controls").style.opacity = "0.5";
  }

  function hideCountryDetails() {
    document.getElementById("countryDetails").style.display = "none";
    document.querySelector(".table-container").classList.remove("hidden");
    document.querySelector(".controls").style.opacity = "1";
    document.getElementById("countrySelect").value = "";
    currentCountry = null;
  }

  // Event Listeners
  document.addEventListener("DOMContentLoaded", () => {
    fetchCountries();

    document.getElementById("continentSelect").addEventListener("change", renderTableAndSubregionsDropdown);
    document.getElementById("subregionSelect").addEventListener("change", () => {
      populateCountryDropdown();
      renderTable();
    });
    
    document.getElementById("countrySelect").addEventListener("change", (e) => {
      if (e.target.value) {
        showCountryDetails(e.target.value);
      }
    });

    document.getElementById("closeDetails").addEventListener("click", hideCountryDetails);

    // Close on outside click
    document.getElementById("countryDetails").addEventListener("click", (e) => {
      if (e.target.id === "countryDetails") {
        hideCountryDetails();
      }
    });
  });
</script>

</body>
</html>
